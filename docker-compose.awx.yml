# Docker Compose pour AWX (Ansible Tower open-source)
# Usage: docker-compose -f docker-compose.awx.yml up -d

version: '3.8'

services:
  postgres-awx:
    image: postgres:13
    container_name: awx-postgres
    environment:
      POSTGRES_DB: awx
      POSTGRES_USER: awx
      POSTGRES_PASSWORD: awxpassword
    volumes:
      - awx-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Port différent pour éviter les conflits
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  memcached-awx:
    image: memcached:alpine
    container_name: awx-memcached
    ports:
      - "11211:11211"
    networks:
      - kura-network

  awx:
    image: ansible/awx:latest
    container_name: awx
    depends_on:
      postgres-awx:
        condition: service_healthy
      memcached-awx:
        condition: service_started
    environment:
      AWX_ADMIN_USER: admin
      AWX_ADMIN_PASSWORD: admin
      DATABASE_HOST: postgres-awx
      DATABASE_PORT: 5432
      DATABASE_NAME: awx
      DATABASE_USER: awx
      DATABASE_PASSWORD: awxpassword
      MEMCACHED_HOST: memcached-awx
      MEMCACHED_PORT: 11211
      AWX_TASK_CONTAINER_REPO: ansible/awx
      AWX_WEB_CONTAINER_REPO: ansible/awx
    ports:
      - "8080:8080"
    volumes:
      - awx-data:/var/lib/awx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v2/ping/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s  # AWX prend du temps à démarrer
    networks:
      - kura-network

  ansible-service:
    build:
      context: ./services/ansible-service
      dockerfile: Dockerfile
    container_name: kura-ansible-service
    ports:
      - "8083:8083"
    environment:
      ANSIBLE_SERVICE_PORT: "8083"
      ENV: development
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ANSIBLE_CACHE_TTL: "300"
      ANSIBLE_TOWER_URL: http://awx:8080
      ANSIBLE_TOWER_USERNAME: admin
      ANSIBLE_TOWER_PASSWORD: admin
      ANSIBLE_TOWER_VERIFY_SSL: "false"
    depends_on:
      redis:
        condition: service_healthy
      awx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

volumes:
  awx-postgres-data:
  awx-data:

networks:
  kura-network:
    external: true
