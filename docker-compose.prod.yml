# Stack Kura pour production (images pré-construites dans Artifact Registry)
# Variables requises : DOCKER_REGISTRY (ex: europe-west1-docker.pkg.dev/PROJECT/kura/)
#                      IMAGE_TAG (ex: main ou sha-xxx)

services:
  postgres:
    image: postgres:15-alpine
    container_name: kura-postgres
    environment:
      POSTGRES_DB: kura
      POSTGRES_USER: kura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kura}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kura"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kura-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network
    restart: unless-stopped

  kong:
    image: kong:3.4
    container_name: kura-kong
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_DNS_RESOLVER: "127.0.0.11"
    volumes:
      - ./infrastructure/docker/kong.yml:/usr/local/kong/kong.yml:ro
    depends_on:
      auth-service:
        condition: service_healthy
      terraform-service:
        condition: service_started
      k8s-service:
        condition: service_started
      ansible-service:
        condition: service_started
      pipeline-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network
    restart: unless-stopped

  auth-service:
    image: ${DOCKER_REGISTRY}auth-service:${IMAGE_TAG:-latest}
    container_name: kura-auth-service
    environment:
      AUTH_SERVICE_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: kura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kura}
      POSTGRES_DB: kura
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      JWT_EXPIRATION: 24h
      ENV: production
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network
    restart: unless-stopped

  terraform-service:
    image: ${DOCKER_REGISTRY}terraform-service:${IMAGE_TAG:-latest}
    container_name: kura-terraform-service
    environment:
      TERRAFORM_SERVICE_PORT: "8082"
      ENV: production
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      TERRAFORM_CACHE_TTL: "5m"
      LOG_LEVEL: info
      TERRAFORM_ENCRYPTION_KEY: ${TERRAFORM_ENCRYPTION_KEY:-change-in-production-32-bytes!!}
      TERRAFORM_STATE_BACKEND: ${TERRAFORM_STATE_BACKEND:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kura-network
    restart: unless-stopped

  k8s-service:
    image: ${DOCKER_REGISTRY}k8s-service:${IMAGE_TAG:-latest}
    container_name: kura-k8s-service
    environment:
      K8S_SERVICE_PORT: "8081"
      ENV: production
      K8S_INCLUSTER: "false"
      KUBECONFIG_PATH: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      K8S_CACHE_TTL: "30s"
      LOG_LEVEL: info
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kura-network
    restart: unless-stopped

  ansible-service:
    image: ${DOCKER_REGISTRY}ansible-service:${IMAGE_TAG:-latest}
    container_name: kura-ansible-service
    environment:
      ANSIBLE_SERVICE_PORT: "8083"
      ENV: production
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ANSIBLE_CACHE_TTL: "300"
      ANSIBLE_TOWER_URL: ${ANSIBLE_TOWER_URL:-}
      ANSIBLE_TOWER_USERNAME: ${ANSIBLE_TOWER_USERNAME:-}
      ANSIBLE_TOWER_PASSWORD: ${ANSIBLE_TOWER_PASSWORD:-}
      ANSIBLE_TOWER_VERIFY_SSL: "false"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network
    restart: unless-stopped

  pipeline-service:
    image: ${DOCKER_REGISTRY}pipeline-service:${IMAGE_TAG:-latest}
    container_name: kura-pipeline-service
    environment:
      PIPELINE_SERVICE_PORT: "8084"
      ENV: production
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      PIPELINE_CACHE_TTL: "24h"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOS: ${GITHUB_REPOS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kura-network
    restart: unless-stopped

  frontend:
    image: ${DOCKER_REGISTRY}frontend:${IMAGE_TAG:-latest}
    container_name: kura-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - kong
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  kura-network:
    driver: bridge
