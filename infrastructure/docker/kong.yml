_format_version: "3.0"
_transform: true

services:
- name: auth-service
  url: http://auth-service:8080
  routes:
  - name: auth-route
    paths:
    - /api/v1/auth
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE
  - name: projects-route
    paths:
    - /api/v1/projects
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE

- name: k8s-service
  url: http://k8s-service:8081
  routes:
  - name: k8s-route
    paths:
    - /api/v1/k8s
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE
    protocols:
    - http
    - https

- name: terraform-service
  url: http://terraform-service:8082
  routes:
  - name: terraform-route
    paths:
    - /api/v1/terraform
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE

- name: ansible-service
  url: http://ansible-service:8080
  routes:
  - name: ansible-route
    paths:
    - /api/ansible
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE

- name: pipeline-service
  url: http://pipeline-service:8080
  routes:
  - name: pipeline-route
    paths:
    - /api/pipeline
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE

plugins:
- name: rate-limiting
  config:
    minute: 100
    hour: 1000
    policy: local
- name: cors
  config:
    origins:
    - "*"
    methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    headers:
    - Accept
    - Accept-Version
    - Content-Length
    - Content-MD5
    - Content-Type
    - Date
    - Authorization
    exposed_headers:
    - X-Auth-Token
    credentials: true
    max_age: 3600
