_format_version: "3.0"
_transform: true

# Chaque service backend est ciblé via un objet `upstream` (plutôt qu'une
# URL `http://<nom>:<port>` directe) avec des health checks actifs activés.
# Sans ça, le balancer DNS de Kong met en cache l'IP résolue d'un conteneur
# pour la durée de vie du worker nginx : quand `docker compose up --build`
# recrée un service (nouvelle IP Docker), Kong continue de cibler l'ancienne
# IP et renvoie 502 "Connection refused" jusqu'à un redémarrage manuel.
# Les health checks actifs (intervalle court) détectent la cible morte,
# la marquent unhealthy, et le balancer ré-interroge le DNS Docker
# (127.0.0.11) pour retrouver la nouvelle IP du conteneur recréé.
upstreams:
- name: auth-service-upstream
  targets:
  - target: auth-service:8080
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

- name: k8s-service-upstream
  targets:
  - target: k8s-service:8081
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

- name: terraform-service-upstream
  targets:
  - target: terraform-service:8082
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

- name: ansible-service-upstream
  targets:
  - target: ansible-service:8083
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

- name: metrics-service-upstream
  targets:
  - target: metrics-service:8086
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

- name: code-service-upstream
  targets:
  - target: code-service:8088
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

- name: vault-service-upstream
  targets:
  - target: vault-service:8087
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

- name: pipeline-service-upstream
  targets:
  - target: pipeline-service:8084
  healthchecks:
    active:
      type: http
      http_path: /health
      timeout: 2
      concurrency: 1
      healthy:
        interval: 5
        successes: 1
      unhealthy:
        interval: 2
        http_failures: 1
        tcp_failures: 1
        timeouts: 1

services:
- name: auth-service
  url: http://auth-service-upstream
  routes:
  - name: auth-route
    paths:
    - /api/v1/auth
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE
    plugins:
    - name: rate-limiting
      config:
        minute: 20
        hour: 200
        policy: local
        limit_by: ip
        error_message: "Trop de tentatives d'authentification. Veuillez réessayer plus tard."
  - name: projects-route
    paths:
    - /api/v1/projects
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS

- name: k8s-service
  url: http://k8s-service-upstream
  connect_timeout: 15000   # 15s pour établir la connexion
  read_timeout: 120000     # 120s (auth GKE + appel API peuvent être lents)
  write_timeout: 60000     # 60s
  routes:
  - name: k8s-route
    paths:
    - /api/v1/k8s
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    protocols:
    - http
    - https

- name: terraform-service
  url: http://terraform-service-upstream
  routes:
  - name: terraform-route
    paths:
    - /api/v1/terraform
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE

- name: ansible-service
  url: http://ansible-service-upstream
  routes:
  - name: ansible-route
    paths:
    - /api/v1/ansible
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE
  - name: ansible-webhooks-route
    paths:
    - /api/v1/webhooks/ansible-tower
    strip_path: false
    methods:
    - POST

- name: metrics-service
  url: http://metrics-service-upstream
  routes:
  - name: metrics-route
    paths:
    - /api/v1/metrics
    strip_path: false
    methods:
    - GET
    - OPTIONS

- name: code-service
  url: http://code-service-upstream
  routes:
  - name: code-route
    paths:
    - /api/v1/code
    strip_path: false
    methods:
    - GET
    - OPTIONS

- name: vault-service
  url: http://vault-service-upstream
  routes:
  - name: vault-route
    paths:
    - /api/v1/vault
    strip_path: false
    methods:
    - GET
    - POST
    - DELETE
    - OPTIONS

- name: pipeline-service
  url: http://pipeline-service-upstream
  routes:
  - name: pipeline-route
    paths:
    - /api/v1/pipeline
    strip_path: false
    methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS

plugins:
- name: rate-limiting
  config:
    minute: 100
    hour: 1000
    policy: local
- name: cors
  config:
    origins:
    - "*"
    methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    headers:
    - Accept
    - Accept-Version
    - Content-Length
    - Content-MD5
    - Content-Type
    - Date
    - Authorization
    exposed_headers:
    - X-Auth-Token
    credentials: true
    max_age: 3600
