apiVersion: apps/v1
kind: Deployment
metadata:
  name: awx-postgres
  namespace: kura
  labels:
    app: awx-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: awx-postgres
  template:
    metadata:
      labels:
        app: awx-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:13
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: awx-postgres-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: awx-postgres-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: awx-postgres-config
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: awx-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: awx-postgres
  namespace: kura
  labels:
    app: awx-postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: awx-postgres
