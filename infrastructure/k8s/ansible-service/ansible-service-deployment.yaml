apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-service
  namespace: kura
  labels:
    app: ansible-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ansible-service
  template:
    metadata:
      labels:
        app: ansible-service
    spec:
      containers:
      - name: ansible-service
        image: ansible-service:latest
        # Pour le développement local, builder l'image d'abord
        # docker build -t ansible-service:latest ./services/ansible-service
        imagePullPolicy: Never
        ports:
        - containerPort: 8083
          name: http
        envFrom:
        - configMapRef:
            name: ansible-service-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ansible-service
  namespace: kura
  labels:
    app: ansible-service
spec:
  type: LoadBalancer
  ports:
  - port: 8083
    targetPort: 8083
    protocol: TCP
    name: http
  selector:
    app: ansible-service
