apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: modulops
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true
    
    services:
    - name: auth-service
      url: http://auth-service:8080
      routes:
      - name: auth-route
        paths:
        - /api/auth
        strip_path: false
        methods:
        - GET
        - POST
        - PUT
        - DELETE
    
    - name: k8s-service
      url: http://k8s-service:8080
      routes:
      - name: k8s-route
        paths:
        - /api/k8s
        strip_path: false
        methods:
        - GET
        - POST
        - PUT
        - DELETE
    
    - name: terraform-service
      url: http://terraform-service:8080
      routes:
      - name: terraform-route
        paths:
        - /api/terraform
        strip_path: false
        methods:
        - GET
        - POST
        - PUT
        - DELETE
    
    - name: ansible-service
      url: http://ansible-service:8080
      routes:
      - name: ansible-route
        paths:
        - /api/ansible
        strip_path: false
        methods:
        - GET
        - POST
        - PUT
        - DELETE
    
    - name: pipeline-service
      url: http://pipeline-service:8080
      routes:
      - name: pipeline-route
        paths:
        - /api/pipeline
        strip_path: false
        methods:
        - GET
        - POST
        - PUT
        - DELETE
    
    plugins:
    - name: rate-limiting
      config:
        minute: 100
        hour: 1000
        policy: local
    - name: cors
      config:
        origins:
        - "*"
        methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        exposed_headers:
        - X-Auth-Token
        credentials: true
        max_age: 3600
