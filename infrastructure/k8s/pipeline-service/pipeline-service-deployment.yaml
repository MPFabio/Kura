apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-service
  namespace: kura
  labels:
    app: pipeline-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline-service
  template:
    metadata:
      labels:
        app: pipeline-service
    spec:
      containers:
      - name: pipeline-service
        image: pipeline-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8084
          name: http
        envFrom:
        - configMapRef:
            name: pipeline-service-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pipeline-service
  namespace: kura
  labels:
    app: pipeline-service
spec:
  type: ClusterIP
  ports:
  - port: 8084
    targetPort: 8084
    protocol: TCP
    name: http
  selector:
    app: pipeline-service
