name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  services-go:
    name: Services Go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, k8s-service, pipeline-service, terraform-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Download dependencies
        run: go mod download
        working-directory: services/${{ matrix.service }}

      - name: Build ${{ matrix.service }}
        run: go build -v ./...
        working-directory: services/${{ matrix.service }}

  ansible-service:
    name: Ansible Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/ansible-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: services/ansible-service

      - name: Verify import
        run: python -c "from main import app; print('OK')"
        working-directory: services/ansible-service
