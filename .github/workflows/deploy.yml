name: Deploy to GCP VM

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

env:
  RELEASE_DIR: /opt/kura
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform/gcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.2

      - name: Configure GCP credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > $HOME/gcp-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-sa.json" >> $GITHUB_ENV

      - name: Inject Terraform variables
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          tmp_key=$(mktemp)
          printf '%s\n' "$GCP_SSH_PRIVATE_KEY" > "$tmp_key"
          chmod 600 "$tmp_key"
          pub_key=$(ssh-keygen -y -f "$tmp_key")
          rm -f "$tmp_key"
          cat > terraform.auto.tfvars <<EOF
          gcp_project             = "${GCP_PROJECT_ID}"
          instance_ssh_public_key = "${pub_key} github-actions"
          EOF

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

  build-and-push:
    needs: terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            context: services/auth-service
          - service: k8s-service
            context: services/k8s-service
          - service: terraform-service
            context: services/terraform-service
          - service: pipeline-service
            context: services/pipeline-service
          - service: metrics-service
            context: services/metrics-service
          - service: vault-service
            context: services/vault-service
          - service: ansible-service
            context: services/ansible-service
          - service: code-service
            context: services/code-service
          - service: frontend
            context: frontend
            build-args: |
              VITE_API_BASE_URL=/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build-args || '' }}
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/kura-${{ matrix.service }}:${{ github.sha }},${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/kura-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write production env file
        run: |
          if [ -n "${{ secrets.PROD_ENV_FILE }}" ]; then
            echo "${{ secrets.PROD_ENV_FILE }}" | base64 --decode > .env.production
          fi

      - name: Create deployment archive
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='services/' \
            --exclude='frontend/' \
            --exclude='release.tar.gz' \
            ./ /tmp/kura-release
          tar -C /tmp/kura-release -czf release.tar.gz .

      - name: Wait for VM SSH to be ready
        run: |
          echo "Waiting for SSH on ${{ secrets.GCP_VM_IP }}:22..."
          for i in $(seq 1 30); do
            if nc -z -w5 ${{ secrets.GCP_VM_IP }} 22 2>/dev/null; then
              echo "SSH is up after ${i} attempts"
              exit 0
            fi
            echo "Attempt ${i}/30 — retrying in 10s..."
            sleep 10
          done
          echo "SSH did not become available in time" >&2
          exit 1

      - name: Copy archive to VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: /tmp/

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail

            RELEASE_DIR="${{ env.RELEASE_DIR }}"
            RELEASE_SHA="${{ github.sha }}"
            ARCHIVE="/tmp/release.tar.gz"
            RELEASE_PATH="${RELEASE_DIR}/releases/${RELEASE_SHA}"

            sudo mkdir -p "${RELEASE_DIR}/releases"
            sudo rm -rf "${RELEASE_PATH}"
            sudo mkdir -p "${RELEASE_PATH}"
            sudo tar xzf "${ARCHIVE}" -C "${RELEASE_PATH}"
            sudo rm -f "${ARCHIVE}"

            if [ -f "${RELEASE_PATH}/.env.production" ]; then
              sudo mv "${RELEASE_PATH}/.env.production" "${RELEASE_PATH}/.env"
            fi

            sudo ln -sfn "${RELEASE_PATH}" "${RELEASE_DIR}/current"
            cd "${RELEASE_DIR}/current"

            if [ ! -f ".env" ]; then
              echo "Missing .env file" >&2
              exit 1
            fi

            # Authentification ghcr.io
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Injecter le tag des images dans le .env
            REGISTRY="${{ env.REGISTRY }}"
            OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
            SHA="${{ github.sha }}"
            sudo sed -i '/^IMAGE_TAG/d' .env
            echo "IMAGE_TAG=${SHA}" | sudo tee -a .env > /dev/null
            echo "REGISTRY=${REGISTRY}/${OWNER}" | sudo tee -a .env > /dev/null

            sudo docker compose -p kura --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              down --remove-orphans 2>/dev/null || true

            sudo docker ps -aq | xargs -r sudo docker rm -f || true

            sudo docker compose -p kura --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              pull

            sudo docker compose -p kura --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d

            sudo docker system prune -af || true

            find "${RELEASE_DIR}/releases" -maxdepth 1 -mindepth 1 -type d | sort | head -n -2 | xargs -r sudo rm -rf
