name: Deploy to GCP VM

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  RELEASE_DIR: /opt/kura
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform/gcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.2

      - name: Configure GCP credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > $HOME/gcp-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-sa.json" >> $GITHUB_ENV

      - name: Inject Terraform variables
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          tmp_key=$(mktemp)
          printf '%s\n' "$GCP_SSH_PRIVATE_KEY" > "$tmp_key"
          chmod 600 "$tmp_key"

          pub_key=$(ssh-keygen -y -f "$tmp_key")
          rm -f "$tmp_key"

          cat > terraform.auto.tfvars <<EOF
          gcp_project             = "${GCP_PROJECT_ID}"
          instance_ssh_public_key = "${pub_key} github-actions"
          EOF

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write production env file
        run: |
          if [ -n "${{ secrets.PROD_ENV_FILE }}" ]; then
            echo "${{ secrets.PROD_ENV_FILE }}" | base64 --decode > .env.production
            echo "PROD_ENV_GENERATED=1" >> $GITHUB_ENV
          fi

      - name: Check env file presence
        run: |
          if [ -z "${{ env.PROD_ENV_GENERATED }}" ]; then
            echo "No .env.production generated (PROD_ENV_FILE secret empty)"
          else
            echo ".env.production generated successfully"
          fi

      - name: Create deployment archive
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='release.tar.gz' \
            ./ /tmp/modulops-release

          tar \
            -C /tmp/modulops-release \
            -czf release.tar.gz \
            .

      - name: Copy archive to VM
        uses: appleboy/scp-action@v0.1.9
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: /tmp/

      # Écriture des secrets sensibles sur le runner avant envoi sur la VM
      - name: Write secrets to files
        run: |
          mkdir -p /tmp/kura-secrets

          # Service account GCP (pour k8s-service et terraform-service)
          if [ -n "${{ secrets.GCP_SA_JSON }}" ]; then
            echo '${{ secrets.GCP_SA_JSON }}' > /tmp/kura-secrets/gcp-sa.json
          fi

          # Kubeconfig Ansible (pour Semaphore → kubernetes.core)
          if [ -n "${{ secrets.KUBECONFIG_ANSIBLE }}" ]; then
            echo '${{ secrets.KUBECONFIG_ANSIBLE }}' > /tmp/kura-secrets/kubeconfig-ansible
          fi

      - name: Copy secrets to VM
        if: hashFiles('/tmp/kura-secrets/*') != ''
        uses: appleboy/scp-action@v0.1.9
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          source: /tmp/kura-secrets
          target: /tmp/
          strip_components: 0

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            RELEASE_DIR="${{ env.RELEASE_DIR }}"
            RELEASE_SHA="${{ github.sha }}"
            ARCHIVE="/tmp/release.tar.gz"
            RELEASE_PATH="${RELEASE_DIR}/releases/${RELEASE_SHA}"

            # Répertoire persistant pour les secrets (survit aux redéploiements)
            sudo mkdir -p /opt/kura-secrets

            # Copier les secrets depuis le runner vers l'emplacement persistant
            if [ -f /tmp/kura-secrets/gcp-sa.json ]; then
              sudo cp /tmp/kura-secrets/gcp-sa.json /opt/kura-secrets/gcp-sa.json
              sudo chmod 600 /opt/kura-secrets/gcp-sa.json
            fi

            if [ -f /tmp/kura-secrets/kubeconfig-ansible ]; then
              sudo cp /tmp/kura-secrets/kubeconfig-ansible /opt/kura-secrets/kubeconfig-ansible
              sudo chmod 600 /opt/kura-secrets/kubeconfig-ansible
            fi

            sudo rm -rf /tmp/kura-secrets

            sudo mkdir -p "${RELEASE_DIR}/releases"
            sudo rm -rf "${RELEASE_PATH}"
            sudo mkdir -p "${RELEASE_PATH}"
            sudo tar xzf "${ARCHIVE}" -C "${RELEASE_PATH}"
            sudo rm -f "${ARCHIVE}"

            # Créer le dossier secrets dans la release (fichier, pas dossier)
            sudo mkdir -p "${RELEASE_PATH}/secrets"
            if [ -f /opt/kura-secrets/gcp-sa.json ]; then
              sudo cp /opt/kura-secrets/gcp-sa.json "${RELEASE_PATH}/secrets/gcp-sa.json"
            fi

            if [ -f "${RELEASE_PATH}/.env.production" ]; then
              sudo mv "${RELEASE_PATH}/.env.production" "${RELEASE_PATH}/.env"
            fi

            # Injecter les chemins de secrets dans le .env
            sudo sed -i '/^KUBECONFIG_ANSIBLE_PATH/d' "${RELEASE_PATH}/.env"
            echo "KUBECONFIG_ANSIBLE_PATH=/opt/kura-secrets/kubeconfig-ansible" | sudo tee -a "${RELEASE_PATH}/.env" > /dev/null
            sudo sed -i '/^GCP_SA_KEY_PATH/d' "${RELEASE_PATH}/.env"
            echo "GCP_SA_KEY_PATH=${RELEASE_PATH}/secrets/gcp-sa.json" | sudo tee -a "${RELEASE_PATH}/.env" > /dev/null

            sudo ln -sfn "${RELEASE_PATH}" "${RELEASE_DIR}/current"
            cd "${RELEASE_DIR}/current"

            if [ ! -f ".env" ]; then
              echo "Missing .env file in ${RELEASE_DIR}/current" >&2
              exit 1
            fi

            sudo docker compose -p kura --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              down --remove-orphans 2>/dev/null || true

            # Supprimer TOUS les conteneurs résiduels (ports bloqués)
            sudo docker ps -aq | xargs -r sudo docker rm -f || true

            sudo docker compose -p kura --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              build --parallel

            sudo docker compose -p kura --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d

            sudo docker system prune -af || true

            find "${RELEASE_DIR}/releases" -maxdepth 1 -mindepth 1 -type d | sort | head -n -2 | xargs -r sudo rm -rf
# trigger redeploy
