services:
  postgres:
    image: postgres:15-alpine
    container_name: kura-postgres
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kura}
      POSTGRES_USER: ${POSTGRES_USER:-kura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kura"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  redis:
    image: redis:7-alpine
    container_name: kura-redis
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --dir /data
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  kong:
    image: kong:3.4
    container_name: kura-kong
    deploy:
      resources:
        limits:
          memory: 512m
    ports:
      - "8000:8000"
      - "8443:8443"
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8444:8444"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "127.0.0.1:8001"
      KONG_DNS_RESOLVER: "127.0.0.11"
      KONG_DNS_ORDER: "LAST,A,CNAME"
      KONG_NGINX_WORKER_PROCESSES: "1"
      # Le résolveur DNS embarqué de Docker renvoie un TTL de 600s pour les
      # noms de service du réseau compose. Kong respecte ce TTL pour ses
      # cibles d'upstream (DNS-based targets) : sans le réduire, l'IP d'un
      # service recréé par `docker compose up --build` (nouvelle IP Docker)
      # n'est ré-résolue par Kong qu'au bout de 10 minutes, provoquant des
      # 502/503 jusqu'à un redémarrage manuel. On force un TTL court pour
      # que les health checks actifs des upstreams (kong.yml) détectent et
      # ré-résolvent la nouvelle IP en quelques secondes.
      KONG_DNS_VALID_TTL: "5"
    volumes:
      - ./infrastructure/docker/kong.yml:/usr/local/kong/kong.yml:ro
    depends_on:
      auth-service:
        condition: service_healthy
      terraform-service:
        condition: service_started
      k8s-service:
        condition: service_started
      ansible-service:
        condition: service_started
      pipeline-service:
        condition: service_started
      vault-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.102.1
    container_name: kura-victoriametrics
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "9090:8428"
    command:
      - '--storageDataPath=/victoria-metrics-data'
      - '--retentionPeriod=15d'
      - '--httpListenAddr=:8428'
    volumes:
      - prometheus-data:/victoria-metrics-data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  vmagent:
    image: victoriametrics/vmagent:v1.102.1
    container_name: kura-vmagent
    deploy:
      resources:
        limits:
          memory: 128m
    command:
      - '--promscrape.config=/etc/vmagent/scrape.yml'
      - '--remoteWrite.url=http://victoriametrics:8428/api/v1/write'
    volumes:
      - ./infrastructure/docker/vmagent-scrape.yml:/etc/vmagent/scrape.yml:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    networks:
      - kura-network

  vmalert:
    image: victoriametrics/vmalert:v1.102.1
    container_name: kura-vmalert
    deploy:
      resources:
        limits:
          memory: 64m
    ports:
      - "8880:8880"
    command:
      - '--datasource.url=http://victoriametrics:8428'
      - '--remoteWrite.url=http://victoriametrics:8428/api/v1/write'
      - '--remoteRead.url=http://victoriametrics:8428'
      - '--notifier.url=http://alertmanager:9093'
      - '--rule=/etc/vmalert/alert_rules.yml'
      - '--evaluationInterval=15s'
    volumes:
      - ./infrastructure/docker/alert_rules.yml:/etc/vmalert/alert_rules.yml:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    networks:
      - kura-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: kura-grafana
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  loki:
    image: grafana/loki:2.9.4
    container_name: kura-loki
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "3100:3100"
    command:
      - '-config.file=/etc/loki/loki.yml'
    volumes:
      - ./infrastructure/docker/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  promtail:
    image: grafana/promtail:2.9.4
    container_name: kura-promtail
    deploy:
      resources:
        limits:
          memory: 128m
    command:
      - '-config.file=/etc/promtail/promtail.yml'
    volumes:
      - ./infrastructure/docker/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - kura-network

  tempo:
    image: grafana/tempo:2.3.1
    container_name: kura-tempo
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command:
      - '-config.file=/etc/tempo/tempo.yml'
    volumes:
      - ./infrastructure/docker/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kura-alertmanager
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./infrastructure/docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: kura-auth-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-kura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kura}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 24h
      ENV: development
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  # Backend S3-compatible pour le tfstate Terraform (optionnel : si TERRAFORM_STATE_BACKEND=s3, le service y persiste les états)
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: kura-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    profiles:
      - tfstate  # Démarrage optionnel : docker compose --profile tfstate up

  terraform-service:
    build:
      context: ./services/terraform-service
      dockerfile: Dockerfile
    container_name: kura-terraform-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8082:8082"
    environment:
      TERRAFORM_SERVICE_PORT: "8082"
      ENV: development
      AUTH_SERVICE_URL: http://auth-service:8080
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      TERRAFORM_CACHE_TTL: "5m"
      LOG_LEVEL: info
      TERRAFORM_ENCRYPTION_KEY: ${TERRAFORM_ENCRYPTION_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      tempo:
        condition: service_healthy
    # Pas de healthcheck : image distroless sans wget/curl
    networks:
      - kura-network

  k8s-service:
    build:
      context: ./services/k8s-service
      dockerfile: Dockerfile
    container_name: kura-k8s-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8081:8081"
    environment:
      K8S_SERVICE_PORT: "8081"
      ENV: development
      AUTH_SERVICE_URL: http://auth-service:8080
      CODE_SERVICE_URL: http://code-service:8088
      K8S_INCLUSTER: "false"
      KUBECONFIG_PATH: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      K8S_CACHE_TTL: "30s"
      K8S_API_TIMEOUT: "60s"
      LOG_LEVEL: info
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      code-service:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/k8s-service || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kura-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_AUTH_URL: ${VITE_AUTH_URL:-}
        VITE_PIPELINE_URL: ${VITE_PIPELINE_URL:-}
    deploy:
      resources:
        limits:
          memory: 128m
    container_name: kura-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - kong
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  vault:
    image: openbao/openbao:2.5
    container_name: kura-vault
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8200:8200"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-kura-vault-dev-token}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      BAO_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - kura-network

  vault-service:
    build:
      context: ./services/vault-service
      dockerfile: Dockerfile
    container_name: kura-vault-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8087:8087"
    environment:
      VAULT_SERVICE_PORT: "8087"
      ENV: development
      AUTH_SERVICE_URL: http://auth-service:8080
      LOG_LEVEL: info
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-kura-vault-dev-token}
      VAULT_MOUNT_PATH: ${VAULT_MOUNT_PATH:-secret}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      vault:
        condition: service_started
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: kura-semaphore
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "3001:3000"
    environment:
      SEMAPHORE_DB_DIALECT: sqlite
      SEMAPHORE_DB_PATH: /home/semaphore/semaphore.db
      SEMAPHORE_TMP_PATH: /tmp/semaphore
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_PASSWORD:-kura-semaphore-2024}
      SEMAPHORE_ADMIN_EMAIL: admin@kura.io
      SEMAPHORE_ADMIN_NAME: Kura Admin
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${SEMAPHORE_ACCESS_KEY_ENCRYPTION}
    volumes:
      - semaphore-data:/home/semaphore
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - kura-network

  ansible-service:
    build:
      context: ./services/ansible-service
      dockerfile: Dockerfile
    container_name: kura-ansible-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8083:8083"
    environment:
      ANSIBLE_SERVICE_PORT: "8083"
      ENV: development
      AUTH_SERVICE_URL: http://auth-service:8080
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      ANSIBLE_CACHE_TTL: "300"
      SEMAPHORE_URL: ${SEMAPHORE_URL}
      SEMAPHORE_API_TOKEN: ${SEMAPHORE_API_TOKEN}
      SEMAPHORE_PROJECT_ID: ${SEMAPHORE_PROJECT_ID:-1}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      K8S_SERVICE_URL: http://k8s-service:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      semaphore:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  metrics-service:
    build:
      context: ./services/metrics-service
      dockerfile: Dockerfile
    container_name: kura-metrics-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8086:8086"
    environment:
      METRICS_SERVICE_PORT: "8086"
      ENV: development
      AUTH_SERVICE_URL: http://auth-service:8080
      LOG_LEVEL: info
      PROMETHEUS_URL: http://victoriametrics:8428
      GRAFANA_URL: http://grafana:3000
      LOKI_URL: http://loki:3100
      TEMPO_URL: http://tempo:3200
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # "saas" : l'observabilité interne de la plateforme Kura est masquée aux clients.
      # "self-hosted" (défaut) : le client opère sa propre instance Kura et peut superviser sa santé,
      # avec la possibilité de basculer entre observabilité interne et observabilité du projet.
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-self-hosted}
      REDIS_DB: "0"
      METRICS_CACHE_TTL: "30s"
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  code-service:
    build:
      context: ./services/code-service
      dockerfile: Dockerfile
    container_name: kura-code-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8088:8088"
    environment:
      CODE_SERVICE_PORT: "8088"
      ENV: development
      AUTH_SERVICE_URL: http://auth-service:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      auth-service:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  pipeline-service:
    build:
      context: ./services/pipeline-service
      dockerfile: Dockerfile
    container_name: kura-pipeline-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8084:8084"
    environment:
      PIPELINE_SERVICE_PORT: "8084"
      ENV: development
      AUTH_SERVICE_URL: http://auth-service:8080
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      PIPELINE_CACHE_TTL: "24h"
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      tempo:
        condition: service_healthy
    # Pas de healthcheck : image distroless sans wget/curl
    networks:
      - kura-network

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  redis-data:
  minio-data:
  semaphore-data:
  loki-data:
  tempo-data:
  alertmanager-data:

networks:
  kura-network:
    driver: bridge
