version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kura-postgres
    environment:
      POSTGRES_DB: kura
      POSTGRES_USER: kura
      POSTGRES_PASSWORD: kura
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kura"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  redis:
    image: redis:7-alpine
    container_name: kura-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kura-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kura-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  kong:
    image: kong:3.4
    container_name: kura-kong
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_DNS_RESOLVER: "127.0.0.11"
      KONG_DNS_ORDER: "LAST,A,CNAME"
    volumes:
      - ./infrastructure/docker/kong.yml:/usr/local/kong/kong.yml:ro
    depends_on:
      - auth-service
      - terraform-service
      - k8s-service
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: kura-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: kura-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: /
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: kura-auth-service
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: kura
      POSTGRES_PASSWORD: kura
      POSTGRES_DB: kura
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRATION: 24h
      ENV: development
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  terraform-service:
    build:
      context: ./services/terraform-service
      dockerfile: Dockerfile
    container_name: kura-terraform-service
    ports:
      - "8082:8082"
    environment:
      TERRAFORM_SERVICE_PORT: "8082"
      ENV: development
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      TERRAFORM_CACHE_TTL: "5m"
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  k8s-service:
    build:
      context: ./services/k8s-service
      dockerfile: Dockerfile
    container_name: kura-k8s-service
    ports:
      - "8081:8081"
    environment:
      K8S_SERVICE_PORT: "8081"
      ENV: development
      K8S_INCLUSTER: "false"
      KUBECONFIG_PATH: ""  # Vide par défaut, les clusters seront ajoutés via l'API
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      K8S_CACHE_TTL: "30s"
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/k8s-service || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kura-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kura-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - kong
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  kura-network:
    driver: bridge
