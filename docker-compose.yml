services:
  postgres:
    image: postgres:15-alpine
    container_name: kura-postgres
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kura}
      POSTGRES_USER: ${POSTGRES_USER:-kura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kura"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  redis:
    image: redis:7-alpine
    container_name: kura-redis
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --dir /data
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: kura-zookeeper
    deploy:
      resources:
        limits:
          memory: 256m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kura-kafka
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  kong:
    image: kong:3.4
    container_name: kura-kong
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "8000:8000"
      - "8443:8443"
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8444:8444"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "127.0.0.1:8001"
      KONG_DNS_RESOLVER: "127.0.0.11"
      KONG_DNS_ORDER: "LAST,A,CNAME"
    volumes:
      - ./infrastructure/docker/kong.yml:/usr/local/kong/kong.yml:ro
    depends_on:
      auth-service:
        condition: service_healthy
      terraform-service:
        condition: service_started
      k8s-service:
        condition: service_started
      ansible-service:
        condition: service_started
      pipeline-service:
        condition: service_started
      vault-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: kura-prometheus
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: kura-grafana
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: kura-auth-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-kura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kura}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 24h
      ENV: development
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  # Backend S3-compatible pour le tfstate Terraform (optionnel : si TERRAFORM_STATE_BACKEND=s3, le service y persiste les états)
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: kura-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    profiles:
      - tfstate  # Démarrage optionnel : docker compose --profile tfstate up

  terraform-service:
    build:
      context: ./services/terraform-service
      dockerfile: Dockerfile
    container_name: kura-terraform-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8082:8082"
    environment:
      TERRAFORM_SERVICE_PORT: "8082"
      ENV: development
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      TERRAFORM_CACHE_TTL: "5m"
      LOG_LEVEL: info
      TERRAFORM_ENCRYPTION_KEY: ${TERRAFORM_ENCRYPTION_KEY}
      # Backend tfstate (S3 / MinIO) : si défini, chaque état uploadé est aussi persisté dans le bucket
      TERRAFORM_STATE_BACKEND: ${TERRAFORM_STATE_BACKEND:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-kura-tfstate}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_KEY_PREFIX: ${AWS_S3_KEY_PREFIX:-tfstate}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    # Pas de healthcheck : image distroless sans wget/curl
    networks:
      - kura-network

  k8s-service:
    build:
      context: ./services/k8s-service
      dockerfile: Dockerfile
    container_name: kura-k8s-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8081:8081"
    environment:
      K8S_SERVICE_PORT: "8081"
      ENV: development
      K8S_INCLUSTER: "false"
      KUBECONFIG_PATH: ""  # Vide par défaut, les clusters seront ajoutés via l'API
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      K8S_CACHE_TTL: "30s"
      K8S_API_TIMEOUT: "60s"  # GKE : première requête (plugin auth) peut être lente
      LOG_LEVEL: info
      # GKE : clé compte de service GCP pour le plugin d'auth (voir docs/CONNECTER_CLUSTER_GKE.md)
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/secrets/gcp-sa.json}
    volumes:
      - ${GCP_SA_KEY_PATH:-./secrets/gcp-sa.json}:/secrets/gcp-sa.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/k8s-service || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kura-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_AUTH_URL: ${VITE_AUTH_URL:-}
        VITE_PIPELINE_URL: ${VITE_PIPELINE_URL:-}
    deploy:
      resources:
        limits:
          memory: 128m
    container_name: kura-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - kong
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  vault:
    image: hashicorp/vault:1.15
    container_name: kura-vault
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    volumes:
      - vault-data:/vault/data
      - ./infrastructure/docker/vault/config.hcl:/vault/config/config.hcl:ro
      - ./infrastructure/docker/vault/init.sh:/vault/init.sh:ro
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - kura-network

  vault-service:
    build:
      context: ./services/vault-service
      dockerfile: Dockerfile
    container_name: kura-vault-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8087:8087"
    environment:
      VAULT_SERVICE_PORT: "8087"
      ENV: development
      LOG_LEVEL: info
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN}
      VAULT_MOUNT_PATH: ${VAULT_MOUNT_PATH:-secret}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
    depends_on:
      vault:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: kura-semaphore
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "3001:3000"
    environment:
      SEMAPHORE_DB_DIALECT: sqlite
      SEMAPHORE_DB_PATH: /home/semaphore/semaphore.db
      SEMAPHORE_TMP_PATH: /tmp/semaphore
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_PASSWORD:-kura-semaphore-2024}
      SEMAPHORE_ADMIN_EMAIL: admin@kura.io
      SEMAPHORE_ADMIN_NAME: Kura Admin
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${SEMAPHORE_ACCESS_KEY_ENCRYPTION}
      KUBECONFIG: /etc/kube/config
    volumes:
      - semaphore-data:/home/semaphore
      - ${KUBECONFIG_ANSIBLE_PATH:-/dev/null}:/etc/kube/config:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - kura-network

  ansible-service:
    build:
      context: ./services/ansible-service
      dockerfile: Dockerfile
    container_name: kura-ansible-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8083:8083"
    environment:
      ANSIBLE_SERVICE_PORT: "8083"
      ENV: development
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      ANSIBLE_CACHE_TTL: "300"
      ANSIBLE_TOWER_URL: ${ANSIBLE_TOWER_URL:-}
      ANSIBLE_TOWER_USERNAME: ${ANSIBLE_TOWER_USERNAME:-admin}
      ANSIBLE_TOWER_PASSWORD: ${ANSIBLE_TOWER_PASSWORD:-changeme}
      ANSIBLE_TOWER_VERIFY_SSL: "false"
      SEMAPHORE_URL: ${SEMAPHORE_URL:-http://semaphore:3000}
      SEMAPHORE_API_TOKEN: ${SEMAPHORE_API_TOKEN:-}
      SEMAPHORE_PROJECT_ID: ${SEMAPHORE_PROJECT_ID:-1}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  metrics-service:
    build:
      context: ./services/metrics-service
      dockerfile: Dockerfile
    container_name: kura-metrics-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8086:8086"
    environment:
      METRICS_SERVICE_PORT: "8086"
      ENV: development
      LOG_LEVEL: info
      PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_URL: http://grafana:3000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      METRICS_CACHE_TTL: "30s"
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kura-network

  pipeline-service:
    build:
      context: ./services/pipeline-service
      dockerfile: Dockerfile
    container_name: kura-pipeline-service
    deploy:
      resources:
        limits:
          memory: 128m
    ports:
      - "8084:8084"
    environment:
      PIPELINE_SERVICE_PORT: "8084"
      ENV: development
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      PIPELINE_CACHE_TTL: "24h"
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOS: ${GITHUB_REPOS:-}
    depends_on:
      redis:
        condition: service_healthy
    # Pas de healthcheck : image distroless sans wget/curl
    networks:
      - kura-network

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  redis-data:
  minio-data:
  semaphore-data:
  vault-data:

networks:
  kura-network:
    driver: bridge
